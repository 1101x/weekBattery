<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>주간 금융 배터리</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ───────── 메인 화면 ───────── -->
<div class="screen active" id="screen-main">
  <header>
    <h1>주간 금융 배터리</h1>
    <button class="icon-btn" id="btn-settings" title="예산 설정">⚙</button>
  </header>
  <div id="battery-wrap">
    <canvas id="battery-canvas"></canvas>
    <div id="hud">
      <div id="pct">100%</div>
      <div id="remain"></div>
    </div>
  </div>
  <div class="bottom-area">
    <button class="btn btn-primary" id="btn-add">+ 내역 추가</button>
    <button class="btn btn-ghost" id="btn-history">이번 주 사용 내역</button>
  </div>
</div>

<!-- ───────── 예산 설정 화면 ───────── -->
<div class="screen" id="screen-budget">
  <div class="sub-header">
    <button class="back-btn" data-back>‹</button>
    <h2>예산 설정</h2>
  </div>
  <div class="sub-body">
    <label class="field-label">일주일 예산</label>
    <input type="text" id="input-budget" inputmode="numeric" placeholder="예: 200000">
    <p class="hint">매주 월요일에 배터리가 100%로 충전됩니다.</p>
    <div class="bottom-area" style="padding: 24px 0 0;">
      <button class="btn btn-primary" id="btn-save-budget">저장</button>
    </div>
  </div>
</div>

<!-- ───────── 내역 추가 화면 ───────── -->
<div class="screen" id="screen-add">
  <div class="sub-header">
    <button class="back-btn" data-back>‹</button>
    <h2>내역 추가</h2>
  </div>
  <div class="sub-body">
    <label class="field-label">문자 붙여넣기</label>
    <textarea id="input-paste" placeholder="카드 승인 문자를 복사해서 붙여넣으면&#10;사용처와 금액이 자동으로 입력됩니다"></textarea>
    <div class="parsed-preview" id="parse-preview"></div>

    <label class="field-label">사용처</label>
    <input type="text" id="input-name" placeholder="예: 편의점">
    <label class="field-label">금액</label>
    <input type="text" id="input-amount" inputmode="numeric" placeholder="예: 4500">

    <div class="bottom-area" style="padding: 28px 0 0;">
      <button class="btn btn-primary" id="btn-save-entry">추가</button>
    </div>
  </div>
</div>

<!-- ───────── 사용 내역 화면 ───────── -->
<div class="screen" id="screen-history">
  <div class="sub-header">
    <button class="back-btn" data-back>‹</button>
    <h2>이번 주 사용 내역</h2>
  </div>
  <div class="sub-body">
    <div class="week-label" id="week-range"></div>
    <div class="summary-card">
      <span class="label">총 사용</span>
      <span class="total" id="week-total">0원</span>
    </div>
    <ul id="entry-list"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
